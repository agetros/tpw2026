{% extends "blog/base.html" %}
{% block content %}
<h1>Crear nueva publicación</h1>
<hr>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Publicar</button>
    <a href="{% url 'post_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock content %}
