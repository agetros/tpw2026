{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog</title>
    <link rel="stylesheet" href="{% static 'blog/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'blog/css/styles.css' %}">
</head>
<body>
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow-sm mb-4 border-0">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0 text-uppercase"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-wrapper">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-success w-100"><i class="bi bi-check-circle"></i> Iniciar sesión</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{% static 'blog/js/bootstrap.bundle.min.js' %}"></script>
</body>
